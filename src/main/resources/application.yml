spring:
  application:
    name: jobgpt
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobgpt}
    username: ${DB_USERNAME:jobgpt}
    password: ${DB_PASSWORD:jobgpt}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

discord:
  bot:
    enabled: ${DISCORD_BOT_ENABLED:true}
    token: ${DISCORD_BOT_TOKEN:}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

jobgpt:
  test-message:
    enabled: ${JOBGPT_TEST_MESSAGE_ENABLED:false}
    search-enabled: ${JOBGPT_TEST_SEARCH_ENABLED:false}
    input: ${JOBGPT_TEST_MESSAGE_INPUT:서울 신입 Java 백엔드 공고 찾아줘}
  notification:
    enabled: ${JOBGPT_NOTIFICATION_ENABLED:true}
    fixed-delay-ms: ${JOBGPT_NOTIFICATION_FIXED_DELAY_MS:3600000}

logging:
  level:
    com.jobgpt: DEBUG
